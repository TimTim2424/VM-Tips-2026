header{
  position:sticky;

}
.stage h2{
  color:#7ee787;

}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
  gap:18px;
}
.card{
  background:#132238;
  border-radius:16px;
  padding:18px;

}
.teams{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.team{
  width:100%;
  font-weight:bold;
}
.team.right{
  text-align:right;
}
.score{
  display:flex;
  align-items:center;
  gap:8px;
}
.score input{
  width:42px;
  height:38px;
  border-radius:8px;
  border:none;
  background:#08111f;
  color:#fff;
  text-align:center;
  font-size:18px;
  font-weight:bold;
}
.meta{
  margin-top:14px;
  color:#9bb0c9;
  font-size:13px;

}
.footer{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#10233b;
  padding:14px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
button{
  background:#5da9ff;
  border:none;
  color:#fff;
  padding:12px 18px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}
.logged-in{
  background:#22c55e !important;
}  
/* =========================
   LOGIN MODAL
========================= */

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.75);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
  padding:20px;
}

.modal-content{
  width:100%;
  max-width:420px;
  max-height:90vh;
  overflow:auto;
  background:#132238;
  border-radius:20px;
  padding:24px;
  border:1px solid rgba(255,255,255,0.08);

.modal-content h2{
  margin-top:0;
  color:#7ee787;
}

.modal-content input{
  width:100%;
  padding:14px;
  margin-bottom:14px;
  border-radius:10px;
  border:none;
  background:#08111f;
  color:white;
  font-size:16px;
  box-sizing:border-box;
}

.modal-content label{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:16px;
  color:#9bb0c9;
  font-size:14px;
}

.modal-buttons{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.modal-buttons button{
  flex:1;
}

.close-btn{
  background:#334155;
}

.link-btn{
  background:none;
  border:none;
  color:#5da9ff;
  padding:0;
  margin-top:10px;
}  
.password-wrapper{

}

.password-toggle{
  position:absolute;
  right:14px;
  top:14px;
  color:#5da9ff;
  cursor:pointer;
  font-size:14px;
}
</style>

let predictions = JSON.parse(localStorage.getItem('vm_predictions') || '{}');

function savePrediction(id, side, value){
  if(!predictions[id]) predictions[id] = {home:'',away:''};
  predictions[id][side] = value;
  localStorage.setItem('vm_predictions', JSON.stringify(predictions));
  updateStats();
}

function updateStats(){
  let total = 0;
  Object.values(predictions).forEach(m=>{
    if(m.home !== '' && m.away !== '') total++;
  });
  document.getElementById('stats').innerText = total + ' matcher ifyllda';
}

const app = document.getElementById('app');

function render(){
 app.innerHTML = ''; 

  const grouped = {};

  MATCHES.forEach((match,index)=>{
    match.id = index;
    if(!grouped[match.stage]) grouped[match.stage] = [];
    grouped[match.stage].push(match);
  });

  Object.keys(grouped).forEach(stage=>{

    const section = document.createElement('div');
    section.className = 'stage';

    section.innerHTML = `<h2>${stage}</h2><div class="grid"></div>`;

    const grid = section.querySelector('.grid');

    grouped[stage].forEach(match=>{

      const saved = predictions[match.id] || {};

      const card = document.createElement('div');
      card.className = 'card';

      card.innerHTML = `
      <div class="top">
        <span class="badge">${match.group}</span>
        <span>${match.date} · ${match.time}</span>
      </div>

      <div class="teams">

        <div class="team">${match.home}</div>

        <div class="score">
          <input type="number" min="0" max="20"
          value="${saved.home || ''}"
          onchange="savePrediction('${match.id}','home',this.value)">

          <span>:</span>

          <input type="number" min="0" max="20"
          value="${saved.away || ''}"
          onchange="savePrediction('${match.id}','away',this.value)">
        </div>

        <div class="team right">${match.away}</div>

      </div>

      <div class="meta">
📍 ${match.stadium}<br>
📺 ${match.tv}
</div>
      `;

      grid.appendChild(card);

    });

    app.appendChild(section);

  });

  updateStats();

}
render();
</script>

  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

console.log("Firebase anslutet!");

}

window.closeLoginModal = function(){
  document.getElementById("loginModal")
    .style.display = "none";
}

window.togglePassword = function(){

  const input =
    document.getElementById("loginPassword");

  input.type =
    input.type === "password"
      ? "text"
      : "password";
}

window.resetPassword = async function(){

  const email =
    document.getElementById("loginEmail").value;

  if(!email){
    alert("Fyll i e-post först");
    return;
  }

  try{

    await sendPasswordResetEmail(auth, email);

    alert("Återställningsmail skickat!");

  }catch(error){

    alert(error.message);

  }

}
// =======================
// LOGIN MODAL
// =======================


// =======================
// REGISTRERA ANVÄNDARE
// =======================

window.register = async function(){

  const username = prompt("Användarnamn:");
  const email = prompt("E-post:");
  const password = prompt("Lösenord:");

  try{

    const userCredential =
      await createUserWithEmailAndPassword(
        auth,
        email,
        password
      );

    const user = userCredential.user;

    // Sparar displayName i Firebase Auth
    await updateProfile(user, {
      displayName: username
    });

    // Sparar användardata i Firestore
    await setDoc(
      doc(db, "users", user.uid),
      {
        username: username,
        email: email,
        created: new Date().toISOString()
      }
    );

    alert("Konto skapat!");

  }catch(error){

    alert(error.message);

  }

}

// =======================
// LOGGA IN
// =======================

window.submitLogin = async function(){

  const email =
    document.getElementById("loginEmail").value;

  const password =
    document.getElementById("loginPassword").value;

  const remember =
    document.getElementById("rememberMe").checked;

  try{

    await setPersistence(
      auth,
      remember
        ? browserLocalPersistence
        : browserSessionPersistence
    );

    await signInWithEmailAndPassword(
      auth,
      email,
      password
    );

    closeLoginModal();

    alert("Inloggad!");

  }catch(error){

    alert(error.message);

  }

}

// =======================
// LOGGA UT
// =======================

window.logout = async function(){

  await signOut(auth);

  alert("Utloggad");

}

// =======================
// SPARA TIPS I FIRESTORE
// =======================

window.saveTips = async function(){

  const user = auth.currentUser;

  if(!user){
    alert("Du måste logga in");
    return;
  }

  try{

    await setDoc(
  doc(db, "tips", user.uid),
 {
  username: user.displayName,
  email: user.email,
  uid: user.uid,
  predictions: predictions,
  updated: new Date().toISOString()
}
);

    alert("Tips sparade i molnet!");

  }catch(error){

    alert(error.message);

  }

}

// =======================
// HÄMTA TIPS
// =======================

async function loadTips(){

  const user = auth.currentUser;

  if(!user) return;

  const docRef = doc(db, "tips", user.uid);

  const snap = await getDoc(docRef);

  if(snap.exists()){

    predictions = snap.data().predictions || {};

    render();

  }

}

// =======================
// LYSSNA PÅ LOGIN
// =======================

onAuthStateChanged(auth, (user)=>{

  const loginBtn =
    document.getElementById("loginBtn");

  if(user){

    console.log("Inloggad:", user.email);

    loginBtn.innerText = "Inloggad";

    loginBtn.classList.add("logged-in");

    loadTips();

  }else{

    console.log("Inte inloggad");

    loginBtn.innerText = "Logga in";

    loginBtn.classList.remove("logged-in");

  }

});
</script>
