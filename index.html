<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VM-Tips 2026</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#08111f;color:#fff}
header{position:sticky;top:0;background:#10233b;padding:20px;z-index:100}
.container{max-width:1400px;margin:auto;padding:20px}
.stage{margin-bottom:50px}
.stage h2{color:#7ee787}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px}
.card{background:#132238;border-radius:16px;padding:18px}
.top{display:flex;justify-content:space-between;margin-bottom:16px;color:#9bb0c9;font-size:14px}
.badge{background:#1d3b5d;color:#5da9ff;border-radius:999px;padding:5px 10px}
.teams{display:flex;align-items:center;justify-content:space-between;gap:12px}
.team{width:100%;font-weight:bold}
.team.right{text-align:right}
.score{display:flex;align-items:center;gap:8px}
.score input{width:42px;height:38px;border-radius:8px;border:none;background:#08111f;color:#fff;text-align:center;font-size:18px;font-weight:bold}
.footer{position:fixed;bottom:0;left:0;right:0;background:#10233b;padding:14px 20px;display:flex;justify-content:space-between}
button{background:#5da9ff;border:none;color:#fff;padding:12px 18px;border-radius:10px;cursor:pointer;font-weight:bold}
</style>
</head>
<body>

<header>
<h1>VM-Tips 2026</h1>
</header>

<div class="container" id="app"></div>

<div class="footer">
<div id="stats">0 / 104 matcher ifyllda</div>
<button onclick="saveTips()">Spara tips</button>
</div>

<script>

const MATCHES = [];

const GROUPS = {
A:['Mexico','South Africa','South Korea','Czechia'],
B:['Canada','Bosnia and Herzegovina','Qatar','Switzerland'],
C:['Brazil','Morocco','Haiti','Scotland'],
D:['USMNT','Paraguay','Australia','Türkiye'],
E:['Germany','Curaçao','Côte d’Ivoire','Ecuador'],
F:['Netherlands','Japan','Sweden','Tunisia'],
G:['Belgium','Egypt','Iran','New Zealand'],
H:['Spain','Cabo Verde','Saudi Arabia','Uruguay'],
I:['France','Senegal','Iraq','Norway'],
J:['Argentina','Algeria','Austria','Jordan'],
K:['Portugal','DR Congo','Uzbekistan','Colombia'],
L:['England','Croatia','Ghana','Panama']
};

function addGroupMatches(letter, teams){
const fixtures = [
[teams[0], teams[1]],
[teams[2], teams[3]],
[teams[0], teams[2]],
[teams[1], teams[3]],
[teams[0], teams[3]],
[teams[1], teams[2]]
];

fixtures.forEach((f,index)=>{
MATCHES.push({
id:`GROUP_${letter}_${index+1}`,
stage:'Gruppspel',
group:letter,
home:f[0],
away:f[1],
date:'Juni 2026',
stadium:'VM Arena'
});
});
}

Object.entries(GROUPS).forEach(([letter,teams])=>{
addGroupMatches(letter,teams);
});

for(let i=1;i<=16;i++){
MATCHES.push({
id:`R32_${i}`,
stage:'Round of 32',
group:'Slutspel',
home:`Lag ${i}A`,
away:`Lag ${i}B`,
date:'Juni/Juli',
stadium:'VM Arena'
});
}

for(let i=1;i<=8;i++){
MATCHES.push({
id:`R16_${i}`,
stage:'Åttondelsfinal',
group:'Slutspel',
home:`Vinnare ${i}A`,
away:`Vinnare ${i}B`,
date:'Juli',
stadium:'VM Arena'
});
}

for(let i=1;i<=4;i++){
MATCHES.push({
id:`QF_${i}`,
stage:'Kvartsfinal',
group:'Slutspel',
home:`Kvarts ${i}A`,
away:`Kvarts ${i}B`,
date:'Juli',
stadium:'VM Arena'
});
}

for(let i=1;i<=2;i++){
MATCHES.push({
id:`SF_${i}`,
stage:'Semifinal',
group:'Slutspel',
home:`Semi ${i}A`,
away:`Semi ${i}B`,
date:'Juli',
stadium:'VM Arena'
});
}

MATCHES.push({
id:'BRONS',
stage:'Bronsmatch',
group:'Slutspel',
home:'Förlorare SF1',
away:'Förlorare SF2',
date:'18 Juli',
stadium:'Hard Rock Stadium'
});

MATCHES.push({
id:'FINAL',
stage:'Final',
group:'Slutspel',
home:'Vinnare SF1',
away:'Vinnare SF2',
date:'19 Juli',
stadium:'MetLife Stadium'
});

let predictions = JSON.parse(localStorage.getItem('vm_predictions') || '{}');

function savePrediction(id, side, value){
if(!predictions[id]){
predictions[id] = {home:'',away:''};
}
predictions[id][side] = value;
localStorage.setItem('vm_predictions', JSON.stringify(predictions));
updateStats();
}

function updateStats(){
let total = 0;
Object.values(predictions).forEach(m=>{
if(m.home !== '' && m.away !== '') total++;
});
document.getElementById('stats').innerText = total + ' / 104 matcher ifyllda';
}

const app = document.getElementById('app');

function render(){

const grouped = {};

MATCHES.forEach(match=>{
if(!grouped[match.stage]) grouped[match.stage] = [];
grouped[match.stage].push(match);
});

Object.keys(grouped).forEach(stage=>{

const section = document.createElement('div');
section.className = 'stage';

section.innerHTML = `<h2>${stage}</h2><div class="grid"></div>`;

const grid = section.querySelector('.grid');

grouped[stage].forEach(match=>{

const saved = predictions[match.id] || {};

const card = document.createElement('div');
card.className = 'card';

card.innerHTML = `
<div class="top">
<span class="badge">${match.group}</span>
<span>${match.date}</span>
</div>

<div class="teams">

<div class="team">${match.home}</div>

<div class="score">
<input type="number" min="0" max="20"
value="${saved.home || ''}"
onchange="savePrediction('${match.id}','home',this.value)">
<span>:</span>
<input type="number" min="0" max="20"
value="${saved.away || ''}"
onchange="savePrediction('${match.id}','away',this.value)">
</div>

<div class="team right">${match.away}</div>

</div>

<div style="margin-top:14px;color:#9bb0c9;font-size:13px;">
${match.stadium}
</div>
`;

grid.appendChild(card);

});

app.appendChild(section);

});

updateStats();

}

function saveTips(){
alert('Tips sparade!');
}

render();

</script>

</body>
</html>
