let predictions = {};
let currentAuthMode = 'login';
let currentUserProfile = null;

function renderGroups() {
  const container = document.getElementById('schedule-grid');
  container.innerHTML = SCHEDULE.map(day => `
    <div class="date-divider">${day.date}</div>
    ${day.matches.map(m => {
      const valH = predictions[m.id]?.h || '';
      const valA = predictions[m.id]?.a || '';
      return `
      <div class="match-card">
        <div class="match-row">
          <div class="match-info">
            <div class="match-teams">
              ${flags[m.h] || ''} ${m.h} вҖ“ ${flags[m.a] || ''} ${m.a}
            </div>
            <div class="match-meta">
              <span class="meta-item">рҹ•’ ${m.time}</span>
              <span class="meta-item">рҹ“ә ${m.tv}</span>
              <span class="meta-item"><span style="color:#ff4d4d">рҹ“Қ</span> ${m.city}</span>
            </div>
          </div>
          <div class="score-inputs">
            <input type="number" value="${valH}" onchange="updatePred('${m.id}','h',this.value)">
            <span>-</span>
            <input type="number" value="${valA}" onchange="updatePred('${m.id}','a',this.value)">
          </div>
        </div>
      </div>`;
    }).join('')}
  `).join('');
}

window.updatePred = (id, side, val) => {
  if(!predictions[id]) predictions[id] = {h:'', a:''};
  predictions[id][side] = val;
  updateStats();
};

window.saveTips = async () => {
  if(!auth.currentUser) return showToast("Logga in fГ¶rst", true);
  
  // Sparar tips samt bifogar anvГӨndarnamn fГ¶r enkel spГҘrning
  await setDoc(doc(db, "tips", auth.currentUser.uid), {
    predictions, 
    username: currentUserProfile?.username || auth.currentUser.email
  }, {merge: true});
  showToast("Sparat!");
};

// Hanterar vГӨxling mellan flikarna Logga in / Registrera
window.switchAuthTab = (mode) => {
  currentAuthMode = mode;
  const loginTab = document.getElementById('tab-login');
  const registerTab = document.getElementById('tab-register');
  const registerFields = document.getElementById('auth-register-fields');
  const submitBtn = document.getElementById('authSubmitBtn');
  
  if (mode === 'register') {
    loginTab.classList.remove('active');
    registerTab.classList.add('active');
    registerFields.style.display = 'block';
    submitBtn.textContent = 'Skapa konto';
  } else {
    registerTab.classList.remove('active');
    loginTab.classList.add('active');
    registerFields.style.display = 'none';
    submitBtn.textContent = 'Logga in';
  }
};

window.submitAuth = async () => {
  const email = document.getElementById('authEmail').value;
  const password = document.getElementById('authPassword').value;
  
  if (!email || !password) return alert("Fyll i e-post och lГ¶senord.");
  
  if (currentAuthMode === 'login') {
    try {
      await signInWithEmailAndPassword(auth, email, password);
      closeModal('authModal');
    } catch(e) { alert("Fel vid inloggning: " + e.message); }
  } else {
    // Registrering
    const firstName = document.getElementById('regFirstName').value;
    const lastName = document.getElementById('regLastName').value;
    const username = document.getElementById('regUsername').value;
    
    if (!firstName || !lastName || !username) {
      return alert("Fyll i alla profiluppgifter fГ¶r att registrera dig.");
    }
    
    try {
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;
      
      // Spara de publika anvГӨndaruppgifterna i en separat 'users'-samling
      await setDoc(doc(db, "users", user.uid), {
        firstName,
        lastName,
        username,
        email
      });
      
      closeModal('authModal');
      showToast("Konto skapat!");
    } catch(e) { alert("Fel vid registrering: " + e.message); }
  }
};

window.doLogout = async () => { await signOut(auth); location.reload(); };

onAuthStateChanged(auth, async (user) => {
  document.getElementById('loading').classList.add('hidden');
  if(user) {
    // HГӨmta profilen (anvГӨndarnamn m.m.) frГҘn Firestore
    const userDoc = await getDoc(doc(db, "users", user.uid));
    if (userDoc.exists()) {
      currentUserProfile = userDoc.data();
      // HГӨr sГӨtter vi det publika anvГӨndarnamnet i badgen!
      document.getElementById('userBadge').textContent = currentUserProfile.username;
    } else {
      document.getElementById('userBadge').textContent = user.email;
    }
    
    document.getElementById('userBadge').style.display = 'block';
    document.getElementById('loginBtn').style.display = 'none';
    document.getElementById('logoutBtn').style.display = 'block';
    loadUserTips(user);
  }
});

async function loadUserTips(user) {
  const d = await getDoc(doc(db, "tips", user.uid));
  if(d.exists()) {
    predictions = d.data().predictions || {};
    renderGroups();
    updateStats();
  }
}

function updateStats() {
  const count = Object.values(predictions).filter(p => p.h !== '' && p.a !== '').length;
  document.getElementById('footer-stats').textContent = `Tippat: ${count} / 72 matcher`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

window.showPage = (id, btn) => {
В  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
В  document.getElementById('page-' + id).classList.add('active');
В  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
В  if (btn) btn.classList.add('active');
};

window.openModal = (id) => document.getElementById(id).classList.add('open');
window.closeModal = (id) => document.getElementById(id).classList.remove('open');

renderGroups();
</script>
