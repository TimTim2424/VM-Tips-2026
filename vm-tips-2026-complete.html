<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VM-Tips 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#07111f;
  --bg2:#0d1b2a;
  --card:#132238;
  --card2:#1b2f4a;
  --accent:#58a6ff;
  --accent2:#7ee787;
  --text:#f0f6fc;
  --muted:#8b9bb4;
  --border:rgba(255,255,255,0.08);
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:linear-gradient(180deg,var(--bg),#08101a);
  color:var(--text);
}

header{
  position:sticky;
  top:0;
  z-index:100;
  backdrop-filter:blur(10px);
  background:rgba(7,17,31,0.9);
  border-bottom:1px solid var(--border);
}

.header-inner{
  max-width:1400px;
  margin:0 auto;
  padding:18px 24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-size:28px;
  font-weight:800;
  letter-spacing:-0.03em;
}

.logo span{
  color:var(--accent);
}

.stats{
  color:var(--muted);
  font-size:14px;
}

main{
  max-width:1400px;
  margin:0 auto;
  padding:32px 24px 80px;
}

.hero{
  margin-bottom:32px;
}

.hero h1{
  margin:0 0 10px;
  font-size:42px;
  line-height:1;
}

.hero p{
  color:var(--muted);
  max-width:800px;
  line-height:1.6;
}

.groups-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
  gap:20px;
}

.group-card{
  background:linear-gradient(180deg,var(--card),var(--card2));
  border:1px solid var(--border);
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

.group-header{
  padding:18px 20px;
  display:flex;
  align-items:center;
  gap:12px;
  border-bottom:1px solid var(--border);
}

.group-letter{
  width:42px;
  height:42px;
  border-radius:12px;
  background:linear-gradient(135deg,var(--accent),#2563eb);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
  font-size:20px;
}

.group-title{
  font-size:18px;
  font-weight:700;
}

.group-sub{
  color:var(--muted);
  font-size:13px;
}

.match{
  padding:14px 20px;
  border-bottom:1px solid var(--border);
}

.match:last-child{
  border-bottom:none;
}

.teams{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
}

.team{
  flex:1;
  font-size:14px;
  font-weight:600;
}

.team.right{
  text-align:right;
}

.score{
  display:flex;
  align-items:center;
  gap:6px;
}

.score input{
  width:44px;
  height:40px;
  border:none;
  border-radius:10px;
  background:#081220;
  color:var(--text);
  text-align:center;
  font-size:18px;
  font-weight:700;
  outline:none;
  border:1px solid transparent;
}

.score input:focus{
  border-color:var(--accent);
}

.separator{
  color:var(--muted);
  font-weight:700;
}

.footer-save{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:rgba(7,17,31,0.96);
  border-top:1px solid var(--border);
  backdrop-filter:blur(12px);
}

.footer-inner{
  max-width:1400px;
  margin:0 auto;
  padding:16px 24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button{
  border:none;
  background:linear-gradient(135deg,var(--accent),#2563eb);
  color:white;
  padding:12px 20px;
  border-radius:12px;
  font-weight:700;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:translateY(-1px);
}

@media(max-width:700px){

  .hero h1{
    font-size:32px;
  }

  .groups-grid{
    grid-template-columns:1fr;
  }

  .footer-inner{
    flex-direction:column;
    gap:12px;
  }
}

</style>
</head>

<body>

<header>
  <div class="header-inner">
    <div class="logo">VM<span>-Tips</span> 2026</div>
    <div class="stats" id="stats">0 / 72 matcher ifyllda</div>
  </div>
</header>

<main>

  <div class="hero">
    <h1>Fotbolls-VM 2026</h1>
    <p>
      Tippa alla matcher i gruppspelet för VM 2026.
      Dina tips sparas automatiskt i webbläsaren.
    </p>
  </div>

  <div class="groups-grid" id="groups-grid"></div>

</main>

<div class="footer-save">
  <div class="footer-inner">
    <div style="color:var(--muted)">
      Tips sparas automatiskt via localStorage
    </div>

    <button onclick="exportTips()">
      Exportera tips
    </button>
  </div>
</div>

<script>

// ======================================================
// GROUPS + TEAMS
// ======================================================

const GROUPS = [
  {
    letter:'A',
    teams:['USA','Mexiko','Kanada','Uruguay']
  },
  {
    letter:'B',
    teams:['Spanien','Kroatien','Marocko','Belgien']
  },
  {
    letter:'C',
    teams:['Brasilien','Colombia','Schweiz','Kamerun']
  },
  {
    letter:'D',
    teams:['Frankrike','Senegal','Portugal','Ecuador']
  },
  {
    letter:'E',
    teams:['England','Australien','Iran','Elfenbenskusten']
  },
  {
    letter:'F',
    teams:['Argentina','Chile','Bolivia','Peru']
  },
  {
    letter:'G',
    teams:['Tyskland','Japan','Serbien','Costa Rica']
  },
  {
    letter:'H',
    teams:['Nederländerna','Qatar','Sydkorea','Venezuela']
  },
  {
    letter:'I',
    teams:['Italien','Algeriet','Ungern','Jamaica']
  },
  {
    letter:'J',
    teams:['Danmark','Turkiet','Nigeria','Paraguay']
  },
  {
    letter:'K',
    teams:['Österrike','Egypten','Albanien','Bahrain']
  },
  {
    letter:'L',
    teams:['Sverige','Skottland','Saudiarabien','Kina']
  }
];

// ======================================================
// STATE
// ======================================================

let tips = {};

function loadTips(){

  const saved =
    localStorage.getItem('vm_tips_2026');

  if(saved){
    tips = JSON.parse(saved);
  }
}

function saveTips(){

  localStorage.setItem(
    'vm_tips_2026',
    JSON.stringify(tips)
  );

  updateStats();
}

// ======================================================
// MATCH GENERATOR
// ======================================================

function generateMatches(teams){

  return [
    [teams[0],teams[1]],
    [teams[2],teams[3]],

    [teams[0],teams[2]],
    [teams[1],teams[3]],

    [teams[0],teams[3]],
    [teams[1],teams[2]]
  ];
}

// ======================================================
// SAVE MATCH
// ======================================================

function saveMatch(group,index,side,value){

  const key =
    `${group}_${index}`;

  if(!tips[key]){
    tips[key] = {
      home:'',
      away:''
    };
  }

  tips[key][side] = value;

  saveTips();
}

// ======================================================
// RENDER
// ======================================================

function render(){

  const grid =
    document.getElementById('groups-grid');

  grid.innerHTML = '';

  GROUPS.forEach(group => {

    const card =
      document.createElement('div');

    card.className = 'group-card';

    const matches =
      generateMatches(group.teams);

    card.innerHTML = `
      <div class="group-header">

        <div class="group-letter">
          ${group.letter}
        </div>

        <div>
          <div class="group-title">
            Grupp ${group.letter}
          </div>

          <div class="group-sub">
            ${group.teams.join(' · ')}
          </div>
        </div>

      </div>
    `;

    matches.forEach((match,index) => {

      const key =
        `${group.letter}_${index}`;

      const saved =
        tips[key] || {};

      const div =
        document.createElement('div');

      div.className = 'match';

      div.innerHTML = `
        <div class="teams">

          <div class="team">
            ${match[0]}
          </div>

          <div class="score">

            <input
              type="number"
              min="0"
              max="20"
              value="${saved.home || ''}"
              onchange="saveMatch('${group.letter}',${index},'home',this.value)"
            >

            <div class="separator">:</div>

            <input
              type="number"
              min="0"
              max="20"
              value="${saved.away || ''}"
              onchange="saveMatch('${group.letter}',${index},'away',this.value)"
            >

          </div>

          <div class="team right">
            ${match[1]}
          </div>

        </div>
      `;

      card.appendChild(div);

    });

    grid.appendChild(card);

  });

  updateStats();
}

// ======================================================
// STATS
// ======================================================

function updateStats(){

  let count = 0;

  Object.values(tips).forEach(match => {

    if(
      match.home !== '' &&
      match.away !== ''
    ){
      count++;
    }

  });

  document.getElementById('stats')
    .textContent =
      `${count} / 72 matcher ifyllda`;
}

// ======================================================
// EXPORT
// ======================================================

function exportTips(){

  const data =
    JSON.stringify(tips,null,2);

  const blob =
    new Blob([data],{
      type:'application/json'
    });

  const url =
    URL.createObjectURL(blob);

  const a =
    document.createElement('a');

  a.href = url;

  a.download =
    'vm-tips-2026.json';

  a.click();

  URL.revokeObjectURL(url);
}

// ======================================================
// INIT
// ======================================================

loadTips();
render();

</script>

</body>
</html>
